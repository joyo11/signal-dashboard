<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Signal Performance — Command Center</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="theme-color" content="#01101F" />
<meta name="description" content="DOT signal operations command center: which signals are misbehaving, and which to retime first. Live-computed from an ATSPM-style pipeline." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script>(function(){try{var s=localStorage.getItem('sp_theme');var d=s?s==='dark':(window.matchMedia&&matchMedia('(prefers-color-scheme:dark)').matches);document.documentElement.setAttribute('data-theme', d?'dark':'light');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
<link rel="stylesheet" href="vendor/leaflet.css" />
<link rel="stylesheet" href="app.css" />
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header class="hdr">
    <div class="brand">
      <div class="brand-mk" aria-hidden="true"><i class="r"></i><i class="a"></i><i class="g"></i></div>
      <div>
        <div class="brand-t1">Signal&nbsp;Ops</div>
        <div class="brand-t2">SIGNAL PERFORMANCE · UDOT DISTRICT 2</div>
      </div>
    </div>
    <nav class="nav" id="nav">
      <button data-page="ops" class="on">Operations</button>
      <button data-page="corridors">Corridors</button>
    </nav>
    <div class="spacer"></div>
    <div class="live"><i></i><span id="liveLabel">LIVE</span></div>
    <button class="hbtn" id="themeBtn" aria-label="Toggle theme">
      <svg class="ico-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="ico-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
      <span id="themeLabel">Theme</span>
    </button>
  </header>

  <!-- OPERATIONS PAGE -->
  <div id="page-ops">
  <!-- OPS KPI STRIP -->
  <div class="opsbar" id="opsKpis"></div>

  <!-- BODY -->
  <div class="body">
    <!-- LEFT RAIL -->
    <aside class="rail">
      <section class="card nh fade">
        <div class="nh-top">
          <h2 class="sec-t">NETWORK HEALTH</h2>
          <span class="mono" style="font-size:10px;color:var(--mute)" id="nhCount">12 signals</span>
        </div>
        <div id="donut"></div>
        <div class="nh-rows" id="nhRows"></div>
      </section>
      <section class="card alerts fade" style="animation-delay:.06s">
        <div class="sec-h">
          <h2 class="sec-t">LIVE INCIDENT FEED</h2>
          <span class="mono" style="font-size:10px;color:var(--alert)" id="alertCrit"></span>
        </div>
        <div class="alerts-body" id="alertsBody"></div>
      </section>
    </aside>

    <!-- CENTER -->
    <main class="center">
      <section class="card hero fade" style="animation-delay:.1s">
        <div class="hero-h">
          <div>
            <h2 class="serif" id="heroTitle">Traffic Network</h2>
            <p id="heroSub">All signals · colored by retiming priority</p>
          </div>
          <div class="seg" id="seg">
            <button data-view="map" class="on">Map</button>
            <button data-view="trend">Trend</button>
            <button data-view="queue">Queue</button>
            <button data-view="heatmap">Heatmap</button>
          </div>
        </div>
        <div class="hero-body" id="heroBody"></div>
      </section>
    </main>

    <!-- RIGHT RAIL -->
    <aside class="rail">
      <section class="card rq fade" style="animation-delay:.14s">
        <div class="sec-h" style="display:block">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <h2 class="sec-t">RETIMING QUEUE</h2>
            <button id="viewAll" style="font-size:10.5px;font-weight:500;color:var(--accent);background:none;border:none;cursor:pointer">View all →</button>
          </div>
          <p style="font-size:10.5px;color:var(--mute);margin-top:3px">Composite: 55% PM split · 30% AoR · 15% ped delay</p>
        </div>
        <div class="rq-body" id="rqBody"></div>
      </section>
      <section class="card dev fade" style="animation-delay:.16s">
        <div class="sec-h"><h2 class="sec-t">DEVICE HEALTH</h2><span class="mono" style="font-size:10px;color:var(--mute)" id="devUpd"></span></div>
        <div id="devBody"></div>
      </section>
    </aside>
  </div>

  <!-- BOTTOM: CAMERAS + METRIC TOTALS -->
  <footer class="bottom-tmc">
    <section class="card cams">
      <div class="sec-h"><h2 class="sec-t">TRAFFIC CAMERAS</h2><span class="mono" style="font-size:10px;color:var(--mute)">live feed · demo</span></div>
      <div class="cam-row" id="cams"></div>
    </section>
    <div class="metrics-mini" id="bottom"></div>
  </footer>
  </div>

  <!-- CORRIDORS PAGE -->
  <div id="page-corridors" style="display:none">
    <div class="corr-wrap" id="corrWrap"></div>
  </div>
</div>

<!-- DRAWER -->
<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true"></aside>

<!-- ASSISTANT -->
<button class="asst-fab" id="asstFab" aria-label="Ask the dashboard">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>
<aside class="asst" id="asst" aria-hidden="true">
  <div class="asst-h">
    <div class="t"><i></i> Dashboard assistant</div>
    <button class="asst-x" id="asstX" aria-label="Close">✕</button>
  </div>
  <div class="asst-body" id="asstBody"></div>
  <div class="asst-chips" id="asstChips"></div>
  <form class="asst-form" id="asstForm">
    <input id="asstInput" type="text" placeholder="Ask about the data…" autocomplete="off" />
    <button type="submit" class="asst-send" aria-label="Send">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
    </button>
  </form>
</aside>

<script src="vendor/leaflet.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
